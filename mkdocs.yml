site_name: README
nav:
  - Início: index.md

  - Backend:  
    - Java:
        - Fundamentos:
          - Fundamentos de Java: backend/java/fundamentos-da-linguagem-java.md
          - Convenções de código em Java: backend/java/convencoes-de-codigo-java.md
          - Variáveis, tipos primitivos, operadores e conversões: backend/java/variaveis-tipos-primitivos-operadores-conversoes.md
          - Fundamentos de String: backend/java/fundamentos-de-string.md
          - Estruturas de controle e operadores: backend/java/estruturas-controle-operadores.md
          - Estruturas condicionais: backend/java/estruturas-condicionais.md
          - Estruturas de repetição: backend/java/estruturas-de-repeticao.md
        - Iniciando em Orientação a Objetos (POO):
          - Introdução à POO: backend/java/introducao-orientacao-a-objetos.md
          - Classes e objetos: backend/java/classes-e-objetos.md
          - Classes, objetos e métodos: backend/java/classes-objetos-metodos.md
    
    - Spring:
        - O que é API REST?: backend/spring/api-rest.md
        - Um pouco de HTTP: backend/spring/http.md
        - Por que escolher Spring?: backend/spring/por-que-spring.md
        - Spring Boot: backend/spring/spring-boot.md
        - Spring Initializr: backend/spring/spring-initializr.md
        - Maven e pom.xml: backend/spring/maven-pom.md

theme:
  name: material
  include_page_toc: false
  language: pt-BR
  palette:
    scheme: slate
    primary: indigo
    accent: cyan

  font:
    text: Roboto
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.highlight:
      pygments_style: dracula
      noclasses: false
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra_css:
  - assets/css/custom.css
